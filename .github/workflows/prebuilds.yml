name: prebuilds
on:
  workflow_call:
    inputs:
      provenance:
        type: boolean
      upload-assets:
        type: boolean

permissions:
  contents: read

jobs:
  build:
    runs-on: ${{
      (matrix.os == 'linux' && 'ubuntu-24.04') || (matrix.os == 'linux-arm64' && 'ubuntu-24.04-arm') ||
      (matrix.os == 'macos' && 'macos-14') || (matrix.os == 'windows' && 'windows-2022') }}
    container:
      image: ${{ (matrix.cross == 'arm' && 'debian:10-slim') ||
        (matrix.os == 'linux' || matrix.os == 'linux-arm64') && 'almalinux:8-minimal' || null }}
    strategy:
      matrix:
        os: [linux, linux-arm64, macos, windows]
        cross: ['']
        include:
          - { os: linux, cross: arm }
          - { os: windows, cross: ia32 }
    outputs:
      hash-linux: ${{ steps.hash.outputs.hash-linux }}
      hash-linux-arm: ${{ steps.hash.outputs.hash-linux-arm }}
      hash-linux-arm64: ${{ steps.hash.outputs.hash-linux-arm64 }}
      hash-macos: ${{ steps.hash.outputs.hash-macos }}
      hash-windows: ${{ steps.hash.outputs.hash-windows }}
      hash-windows-ia32: ${{ steps.hash.outputs.hash-windows-ia32 }}
    env:
      JOBS: 3
      ZSTD_NAPI_ENABLE_HARDEN: ${{ matrix.cross == 'arm' && '2' || '1' }}
      ZSTD_NAPI_ENABLE_LTO: 1
    steps:
      - name: Install system dependencies
        run: microdnf -y install gcc-toolset-14 git jq make python3 tar xz
        if: runner.os == 'Linux' && matrix.cross == ''
      - name: Install system dependencies
        run: apt-get update && apt-get -y install g++-arm-linux-gnueabihf git jq make python3
        if: matrix.cross == 'arm'
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: recursive
      - uses: ./.github/actions/setup
      - name: Build ${{ (runner.arch == 'ARM64' && 'arm64') || 'x64' }}
        run: ${{ (runner.os == 'Linux' && 'scl enable gcc-toolset-14 --') || '' }} bash .github/prebuild.sh
        if: matrix.cross == ''
      - name: Build arm cross
        run: bash .github/prebuild.sh arm
        if: matrix.cross == 'arm'
        env:
          AR: arm-linux-gnueabihf-gcc-ar
          CC: arm-linux-gnueabihf-gcc
          CXX: arm-linux-gnueabihf-g++
      - name: Build ia32 cross
        run: bash .github/prebuild.sh ia32
        if: matrix.cross == 'ia32'
      - name: Build x64 cross
        run: bash .github/prebuild.sh x64
        if: runner.os == 'macOS'
      - name: Upload prebuilds
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.1
        with:
          name: prebuilds-${{ matrix.os }}${{ matrix.cross != '' && '-' || '' }}${{ matrix.cross }}
          path: prebuilds/
      - id: hash
        run: echo "hash-${{ matrix.os }}${{ matrix.cross != '' && '-' || '' }}${{ matrix.cross }}=$(openssl sha256 -r * | tr '*' ' ' | jq -Rrs @base64)" >> "$GITHUB_OUTPUT"
        shell: bash
        working-directory: prebuilds

  upload-build:
    if: inputs.upload-assets
    needs: [build]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/download-artifact@cc203385981b70ca67e1cc392babf9cc229d5806 # v4.1.9
        with:
          pattern: prebuilds-*
          merge-multiple: true
          path: prebuilds
      - run: gh release upload '${{ github.ref_name }}' ./prebuilds/*.tar.gz
        env:
          GH_TOKEN: ${{ github.token }}

  test-build:
    needs: [build]
    runs-on: ${{
      (matrix.os == 'linux' && ((matrix.arch == 'x64' && 'ubuntu-24.04') || 'ubuntu-24.04-arm')) ||
      (matrix.os == 'macos' && ((matrix.arch == 'x64' && 'macos-13') || 'macos-14')) ||
      (matrix.os == 'windows' && 'windows-2022') }}
    strategy:
      fail-fast: false
      matrix:
        os: [linux, macos, windows]
        arch: [arm64, x64]
        exclude: [{ os: windows, arch: arm64 }]
        include: [{ os: linux, arch: arm }, { os: windows, arch: ia32 }]
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
      - uses: ./.github/actions/setup
        with:
          architecture: ${{ (matrix.arch == 'ia32' && 'x86') || null }}
      - uses: actions/download-artifact@65a9edc5881444af0b9093a5e628f2fe47ea3b2e # v4.1.7
        with:
          name: prebuilds-${{ matrix.os }}${{
            (matrix.os == 'linux' && matrix.arch == 'arm' && '-arm') ||
            (matrix.os == 'linux' && matrix.arch == 'arm64' && '-arm64') ||
            (matrix.os == 'windows' && matrix.arch == 'ia32' && '-ia32') || '' }}
      - run: tar xf zstd-napi-v*-napi-v8-*-${{ matrix.arch }}.tar.gz
        shell: bash
      # FIXME: Build buster-slim image for latest 18.x
      - name: Run npm run test in Docker
        run: |
          docker run --platform linux/${{ (matrix.arch == 'x64' && 'amd64') || matrix.arch }} \
            -v $(pwd):/code -w /code node:18.20.3-buster-slim npm run test
        if: runner.os == 'Linux'
      - run: npm run test
        if: runner.os != 'Linux'

  hashes:
    needs: [build]
    if: inputs.provenance
    runs-on: ubuntu-24.04
    outputs:
      hashes: ${{ steps.combine.outputs.hashes }}
    steps:
      - id: combine
        run: echo "hashes=$(jq -nr '[env.HASHES|fromjson|.[]|@base64d]|join("")|@base64')" >> "$GITHUB_OUTPUT"
        env:
          HASHES: ${{ toJSON(needs.build.outputs) }}
      - run: echo "${{ steps.combine.outputs.hashes }}"

  provenance:
    needs: [hashes]
    if: inputs.provenance
    permissions:
      actions: read
      contents: write
      id-token: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: ${{ needs.hashes.outputs.hashes }}
      provenance-name: prebuilds.intoto.jsonl

  upload-provenance:
    if: inputs.provenance && inputs.upload-assets
    needs: [provenance]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/download-artifact@cc203385981b70ca67e1cc392babf9cc229d5806 # v4.1.9
        with:
          name: ${{ needs.provenance.outputs.provenance-name }}
      - run: gh release upload '${{ github.ref_name }}' '${{ needs.provenance.outputs.provenance-name }}'
        env:
          GH_TOKEN: ${{ github.token }}
